<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | Nexus Tech</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .product-detail-container {
      display: flex;
      gap: 3rem;
      background: var(--card-bg);
      padding: 3rem;
      border-radius: 1rem;
      border: var(--glass-border);
    }
    .product-detail-image {
      flex: 1;
      max-width: 500px;
    }
    .product-detail-image img {
      width: 100%;
      height: auto;
      border-radius: 1rem;
    }
    .product-detail-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .detail-title {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .detail-price {
      font-size: 2rem;
      color: #818cf8;
      font-weight: bold;
      margin-bottom: 1.5rem;
    }
    .detail-desc {
      font-size: 1.1rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    @media (max-width: 768px) {
      .product-detail-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">NexusTech</a>
    <div class="nav-links">
      <a href="/">Products</a>
      <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
      <div id="auth-section">
        <a href="/login.html">Login</a>
      </div>
    </div>
  </nav>

  <main>
    <div id="product-detail-wrapper" style="margin-top: 2rem;">
      <!-- Product details injected here -->
      <p>Loading product...</p>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      const wrapper = document.getElementById('product-detail-wrapper');

      if (!productId) {
        wrapper.innerHTML = '<p>Product not found.</p>';
        return;
      }

      try {
        const res = await fetch(`${API_URL}/products/${productId}`);
        if (!res.ok) throw new Error('Product not found');
        const product = await res.json();

        wrapper.innerHTML = `
          <div class="product-detail-container">
            <div class="product-detail-image">
              <img src="${product.imageUrl}" alt="${product.name}" onerror="this.src='https://placehold.co/600x600/1e293b/818cf8?text=Product+Image'">
            </div>
            <div class="product-detail-info">
              <h1 class="detail-title">${product.name}</h1>
              <div class="detail-price">$${product.price.toFixed(2)}</div>
              <p class="detail-desc">${product.description}</p>
              <button class="btn" id="detail-add-btn" style="font-size: 1.2rem; padding: 1rem;">Add to Cart</button>
            </div>
          </div>
        `;

        document.getElementById('detail-add-btn').addEventListener('click', () => {
          addToCart(product);
        });

      } catch (err) {
        wrapper.innerHTML = '<p>Failed to load product details.</p>';
      }
    });
  </script>
</body>
</html>
