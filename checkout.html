<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Nexus Tech</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <a href="/" class="logo">NexusTech</a>
    <div class="nav-links">
      <a href="/">Products</a>
      <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
      <div id="auth-section">
        <a href="/login.html">Login</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="auth-container" style="max-width: 600px;">
      <h2 style="margin-bottom: 1.5rem;">Checkout</h2>
      <div id="checkout-summary" style="margin-bottom: 2rem;">
        <!-- Order summary injected here -->
      </div>
      <button id="place-order-btn" class="btn" style="background: #10b981;">Place Order</button>
      <div id="checkout-message" style="margin-top: 1rem; color: #10b981; display: none;">
        Order placed successfully! Redirecting...
      </div>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/checkout.js"></script>
</body>
</html>
