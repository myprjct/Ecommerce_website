<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Nexus Tech</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <a href="/" class="logo">NexusTech</a>
    <div class="nav-links">
      <a href="/">Products</a>
      <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
    </div>
  </nav>

  <main>
    <div class="auth-container">
      <div id="login-form-container">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" class="form-control" required>
          </div>
          <button type="submit" class="btn">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
          Don't have an account? <a href="#" id="show-register">Register here</a>
        </p>
      </div>

      <div id="register-form-container" class="hidden">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Create Account</h2>
        <form id="register-form">
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" class="form-control" required>
          </div>
          <button type="submit" class="btn">Register</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
          Already have an account? <a href="#" id="show-login">Login here</a>
        </p>
      </div>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
